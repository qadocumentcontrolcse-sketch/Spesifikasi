<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spesifikasi Bahan Baku — CSE R&D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

  :root {
    --navy: #1a3a6b;
    --navy-light: #2a5298;
    --accent: #c8963e;
    --bg: #f2f0eb;
    --paper: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --border: #d0ccc4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .app-header {
    max-width: 880px; margin: 0 auto 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .logo-box {
    width: 46px; height: 46px; background: var(--navy);
    border-radius: 8px; display: flex; align-items: center;
    justify-content: center; color: #fff;
    font-family: 'DM Serif Display', serif; font-size: 16px;
    flex-shrink: 0;
  }
  .app-title h1 { font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--navy); }
  .app-title p { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .config-banner {
    max-width: 880px; margin: 0 auto 14px;
    background: #fff8e6; border: 1px solid #e8c96a;
    border-radius: 8px; padding: 11px 16px;
    font-size: 12px; color: #7a5c00;
  }
  .config-banner details summary { cursor: pointer; font-weight: 600; }
  .config-banner input {
    width: 100%; margin-top: 7px;
    border: 1px solid #e8c96a; border-radius: 4px;
    padding: 6px 10px; font-size: 12px; background: #fff;
    font-family: 'Inter', sans-serif;
  }
  .config-banner .cfg-btn {
    margin-top: 6px; padding: 5px 14px;
    background: var(--navy); color: #fff;
    border: none; border-radius: 4px; font-size: 12px;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }

  .selector-bar {
    max-width: 880px; margin: 0 auto 20px;
    background: var(--paper); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .selector-bar label { font-size: 11px; font-weight: 600; letter-spacing: .07em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .selector-bar select {
    flex: 1; min-width: 220px;
    font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px; background: var(--bg); cursor: pointer; outline: none;
  }
  .selector-bar select:focus { border-color: var(--navy); }

  .btn-dl {
    padding: 8px 18px; background: var(--navy); color: #fff;
    border: none; border-radius: 6px; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 6px; transition: background .15s;
  }
  .btn-dl:hover { background: var(--navy-light); }
  .btn-dl:disabled { background: #999; cursor: not-allowed; }

  .doc-wrap { max-width: 880px; margin: 0 auto; }

  #docArea {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 2px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
  }

  /* ── DOCUMENT PRINT AREA ── */
  #docContent {
    width: 794px;
    padding: 40px 50px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    color: #1a1a1a;
    background: #fff;
    margin: 0 auto;
  }

  /* KOP — match DOCX exactly */
  .kop {
    width: 100%;
    border-collapse: collapse;
    border: 1.5px solid #111;
    margin-bottom: 0;
  }
  .kop td {
    border: 1.5px solid #111;
    vertical-align: middle;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
  }
  .kop-logo {
    width: 110px;
    text-align: center;
    padding: 8px 6px;
  }
  .kop-logo .cse-badge {
    display: inline-block;
    background: #1a3a6b;
    color: #fff;
    font-size: 20px;
    font-weight: 900;
    padding: 4px 10px;
    letter-spacing: 1px;
    margin-bottom: 3px;
  }
  .kop-logo .brand-sub {
    font-size: 7px;
    font-weight: 700;
    letter-spacing: .05em;
    color: #1a3a6b;
    line-height: 1.5;
    text-align: center;
    display: block;
  }
  .kop-title {
    width: 45%;
    text-align: center;
    padding: 8px 10px;
  }
  .kop-title .t1 {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
  }
  .kop-title .t2 {
    font-size: 12px;
    font-weight: 700;
    color: #1a3a6b;
    margin-top: 4px;
  }
  .kop-meta {
    padding: 7px 10px;
    font-size: 10px;
    vertical-align: top;
  }
  .kop-meta .pg {
    font-weight: 700;
    margin-bottom: 4px;
    font-size: 10px;
  }
  .kop-meta table {
    border-collapse: collapse;
    font-size: 10px;
    width: 100%;
  }
  .kop-meta table td {
    border: none;
    padding: 1px 0;
    vertical-align: top;
  }
  .kop-meta .ml {
    font-weight: 700;
    white-space: nowrap;
    padding-right: 4px;
    min-width: 100px;
  }

  /* BAGIAN header */
  .bagian-hdr {
    border: 1.5px solid #111;
    border-top: none;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    padding: 5px;
    letter-spacing: .04em;
    font-family: Arial, Helvetica, sans-serif;
  }

  /* TTD grid */
  .ttd-tbl {
    width: 100%;
    border-collapse: collapse;
    border: 1.5px solid #111;
    border-top: none;
    margin-bottom: 20px;
    font-family: Arial, Helvetica, sans-serif;
  }
  .ttd-tbl td {
    border: 1.5px solid #111;
    padding: 7px 12px;
    font-size: 10px;
    text-align: center;
    vertical-align: bottom;
    width: 33.33%;
  }
  .ttd-tbl .role {
    font-weight: 700;
    display: block;
    padding-bottom: 40px;
  }
  .ttd-tbl .name {
    font-weight: 700;
    border-top: 1px solid #111;
    padding-top: 4px;
    display: block;
    font-size: 10px;
  }

  /* Sections */
  .sec { margin-bottom: 16px; }
  .sec-title {
    font-size: 11px;
    font-weight: 700;
    text-decoration: underline;
    margin-bottom: 5px;
    font-family: Arial, Helvetica, sans-serif;
  }

  /* Identitas table */
  table.tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 10.5px;
    font-family: Arial, Helvetica, sans-serif;
  }
  table.tbl th {
    background: #1a3a6b;
    color: #fff;
    padding: 5px 8px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    border: 1px solid #111;
  }
  table.tbl td {
    border: 1px solid #111;
    padding: 4px 8px;
    vertical-align: top;
  }
  table.tbl .lbl {
    font-weight: 700;
    background: #f0f0f0;
    width: 175px;
  }

  /* Riwayat table */
  table.rtbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 10.5px;
    font-family: Arial, Helvetica, sans-serif;
  }
  table.rtbl th {
    background: #1a3a6b;
    color: #fff;
    padding: 5px 8px;
    font-size: 10px;
    font-weight: 700;
    text-align: center;
    border: 1px solid #111;
  }
  table.rtbl td {
    border: 1px solid #111;
    padding: 4px 8px;
    text-align: center;
    vertical-align: middle;
  }
  table.rtbl td.left { text-align: left; }

  /* Spinner overlay */
  #spinnerOverlay {
    display: none; position: fixed; inset: 0;
    background: rgba(255,255,255,.7); z-index: 999;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; font-size: 14px; color: #1a3a6b; font-weight: 500;
  }
  #spinnerOverlay.show { display: flex; }
  .spinner {
    width: 36px; height: 36px; border: 4px solid #e0e0e0;
    border-top-color: #1a3a6b; border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state svg { margin-bottom: 14px; opacity: .3; }
  .empty-state p { font-size: 13px; }
</style>
</head>
<body>

<!-- Spinner -->
<div id="spinnerOverlay">
  <div class="spinner"></div>
  <span id="spinnerMsg">Membuat PDF…</span>
</div>

<div class="app-header">
  <div class="logo-box">CSE</div>
  <div class="app-title">
    <h1>Spesifikasi Bahan Baku</h1>
    <p>Bagian Research & Development — Cakrawala Semesta Estetika</p>
  </div>
</div>

<div class="config-banner">
  <details>
    <summary>⚙️ Konfigurasi Apps Script URL</summary>
    <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/.../exec" />
    <br><button class="cfg-btn" onclick="saveApiUrl()">Simpan &amp; Muat Data</button>
  </details>
</div>

<div class="selector-bar">
  <label>Pilih Bahan Baku</label>
  <select id="bbSelect" onchange="renderDoc()">
    <option value="">— Memuat daftar… —</option>
  </select>
  <button class="btn-dl" id="dlBtn" onclick="downloadPDF()" disabled>
    ⬇ Download PDF
  </button>
</div>

<div class="doc-wrap">
  <div id="docArea">
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <p>Pilih bahan baku dari dropdown untuk menampilkan dokumen spesifikasi.</p>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'cse_sbb_api_url';
let API_URL = localStorage.getItem(STORAGE_KEY) || 'https://script.google.com/macros/s/AKfycbytg91zwj9QXlcPh_EQU9ykJ5CHe-OaLIFqloEeC2CGBQoMv48xJ7lFsvtCcgohra4h/exec';
let allData = [];
let currentDoc = null;

function saveApiUrl() {
  const v = document.getElementById('apiUrlInput').value.trim();
  if (!v) return alert('URL tidak boleh kosong.');
  localStorage.setItem(STORAGE_KEY, v);
  API_URL = v;
  loadData();
}

window.onload = () => {
  if (API_URL) {
    document.getElementById('apiUrlInput').value = API_URL;
    loadData();
  }
};

async function loadData() {
  const sel = document.getElementById('bbSelect');
  sel.innerHTML = '<option value="">— Memuat… —</option>';
  document.getElementById('dlBtn').disabled = true;
  try {
    const payload = encodeURIComponent(JSON.stringify({ action: 'getDaftarSBB' }));
    const res = await fetch(API_URL + '?payload=' + payload);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    allData = json;

    // Debug: log first item to see field names
    if (allData.length > 0) console.log('Field names sample:', Object.keys(allData[0]));

    // Revisi terbaru per kode BB
    const latest = {};
    allData.forEach(row => {
      const kode = getField(row, ['kodeBB','kode_bb','Kode BB (Isi)','kodeBb','kode BB']);
      const revisi = Number(getField(row, ['revisi','Revisi']) || 0);
      if (!latest[kode] || revisi > Number(getField(latest[kode], ['revisi','Revisi']) || 0))
        latest[kode] = row;
    });
    const sorted = Object.values(latest).sort((a,b) => {
      const na = getField(a,['namaBB','nama_bb','Nama Bahan Baku','namaBahanbaku']) || '';
      const nb = getField(b,['namaBB','nama_bb','Nama Bahan Baku','namaBahanbaku']) || '';
      return na.localeCompare(nb);
    });

    sel.innerHTML = '<option value="">— Pilih Bahan Baku —</option>';
    sorted.forEach(r => {
      const kode = getField(r,['kodeBB','kode_bb','Kode BB (Isi)']);
      const nama = getField(r,['namaBB','nama_bb','Nama Bahan Baku']);
      const noDok = getField(r,['noDokTerbaru','no_dok_terbaru','Nomor Dokumen Terbaru (Acuan)','noDokumen']);
      const o = document.createElement('option');
      o.value = noDok;
      o.textContent = `${kode} — ${nama}`;
      sel.appendChild(o);
    });
  } catch(e) {
    sel.innerHTML = '<option value="">— Gagal memuat —</option>';
    alert('Gagal memuat data: ' + e.message);
  }
}

/**
 * Cari field dari beberapa kemungkinan nama
 */
function getField(obj, keys) {
  for (const k of keys) {
    if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
  }
  // fallback: case-insensitive search
  const lkeys = keys.map(k => k.toLowerCase().replace(/[\s_\-()]/g,''));
  for (const [key, val] of Object.entries(obj)) {
    if (val === undefined || val === null || val === '') continue;
    const norm = key.toLowerCase().replace(/[\s_\-()]/g,'');
    if (lkeys.some(lk => norm === lk || norm.includes(lk) || lk.includes(norm))) return val;
  }
  return '';
}

function safe(v) {
  if (v === undefined || v === null || v === '' || v === '-') return '-';
  return String(v).trim() || '-';
}

/**
 * Format tanggal dari berbagai format:
 * - Serial Excel (angka seperti 46065)
 * - ISO string (2026-06-07T17:00:00.000Z)
 * - String tanggal biasa
 */
function formatDate(val) {
  if (!val || val === '-' || val === '') return '-';

  const s = String(val).trim();

  // ISO string: 2026-06-07T17:00:00.000Z atau 2026-06-07
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    // Ambil hanya bagian tanggal, hindari timezone issue
    const parts = s.substring(0, 10).split('-');
    const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  // Serial Excel (angka)
  const num = parseFloat(s);
  if (!isNaN(num) && num > 40000 && num < 60000) {
    // Excel serial date: hari sejak 1 Jan 1900 (dengan bug tahun kabisat 1900)
    const d = new Date(Math.round((num - 25569) * 86400 * 1000));
    // Koreksi timezone
    const utc = new Date(d.getTime() + d.getTimezoneOffset() * 60000);
    return utc.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  // Sudah string tanggal biasa
  return s;
}

function renderDoc() {
  const noDok = document.getElementById('bbSelect').value;
  const dlBtn = document.getElementById('dlBtn');
  if (!noDok) {
    document.getElementById('docArea').innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p>Pilih bahan baku dari dropdown untuk menampilkan dokumen spesifikasi.</p>
      </div>`;
    dlBtn.disabled = true;
    currentDoc = null;
    return;
  }

  // Cari semua baris dengan noDok ini (berbagai kemungkinan nama field)
  const docRows = allData.filter(r => {
    const nd = getField(r, ['noDokTerbaru','no_dok_terbaru','Nomor Dokumen Terbaru (Acuan)','noDokumen']);
    return nd === noDok;
  });
  if (!docRows.length) return;
  const d = docRows.sort((a,b) => Number(getField(b,['revisi','Revisi'])||0) - Number(getField(a,['revisi','Revisi'])||0))[0];
  currentDoc = d;

  // Debug: tampilkan semua field
  console.log('Selected row fields:', d);

  // Helper untuk ambil field dari row ini
  const f = (keys) => safe(getField(d, keys));

  // Field names — support berbagai variasi nama dari Apps Script
  const kodeBB    = f(['kodeBB','kode_bb','Kode BB (Isi)','kodeBb']);
  const namaBB    = f(['namaBB','nama_bb','Nama Bahan Baku','namaBahanbaku']);
  const noDokTerbaru = f(['noDokTerbaru','no_dok_terbaru','Nomor Dokumen Terbaru (Acuan)','noDokumen','nomorDokumenTerbaru']);
  const noDokSebelumnya = f(['noDokSebelumnya','no_dok_sebelumnya','No. Dokumen Sebelumnya','nomorDokumenSebelumnya']);
  const tanggal   = formatDate(getField(d, ['tanggal','Tanggal (Isi)','tanggalIsi','tanggalBerlaku']));
  const revisi    = getField(d, ['revisi','Revisi']) || '0';

  const inci      = f(['inci','INCI']);
  const produsen  = f(['produsen','PRODUSEN','produsen']);
  const namaPemasok = f(['namaPemasok','nama_pemasok','NAMA PEMASOK','namaSupplier','supplier']);
  const negaraProdusen = f(['negaraProdusen','negara_produsen','NEGARA PRODUSEN','negara']);

  // Spesifikasi — handle berbagai nama field
  const bentuk    = f(['bentuk','bentukSediaan','BENTUK SEDIAAN','bentuk_sediaan']);
  const warna     = f(['warna','WARNA']);
  const bau       = f(['bau','BAU']);
  const ph        = f(['ph','PH','pH']);
  const viskositas = f(['viskositas','VISKOSITAS']);
  const beratJenis = f(['beratJenis','berat_jenis','BERAT JENIS','beratjenis']);
  const indeksBias = f(['indeksBias','indeks_bias','INDEKS BIAS','indexRefraksi','indeksBias','indexBias']);
  const kelarutan = f(['kelarutan','KELARUTAN']);
  const kondisiPenyimpanan = f(['kondisiPenyimpanan','kondisi_penyimpanan','KONDISI PENYIMPANAN','kondisiPenyimpanan']);

  // Riwayat: ambil semua baris dengan kode BB yang sama
  const kode = getField(d, ['kodeBB','kode_bb','Kode BB (Isi)']);
  const history = allData
    .filter(r => getField(r, ['kodeBB','kode_bb','Kode BB (Isi)']) === kode)
    .sort((a,b) => Number(getField(a,['revisi','Revisi'])||0) - Number(getField(b,['revisi','Revisi'])||0));

  // Hanya render baris yang ada isinya
  let histRows = '';
  history.forEach(h => {
    const rev = getField(h, ['revisi','Revisi']);
    const nd  = getField(h, ['noDokTerbaru','no_dok_terbaru','Nomor Dokumen Terbaru (Acuan)']);
    const tgl = formatDate(getField(h, ['tanggal','Tanggal (Isi)']));
    const alasan = getField(h, ['alasanPerubahan','alasan_perubahan','Alasan Perubahan (Isi)','alasan']) || '';

    if (!nd && !alasan) return; // skip baris benar-benar kosong

    const revStr = rev !== '' && rev !== null && rev !== undefined
      ? String(Number(rev)).padStart(2,'0')
      : '';

    histRows += `<tr>
      <td>${revStr}</td>
      <td>${nd || ''}</td>
      <td>${tgl !== '-' ? tgl : ''}</td>
      <td class="left">${alasan}</td>
    </tr>`;
  });

  const revNum = Number(revisi) || 0;

  document.getElementById('docArea').innerHTML = `
<div id="docContent">

  <!-- KOP -->
  <table class="kop">
    <tr>
      <td class="kop-logo">
        <div class="cse-badge">CSE</div>
        <span class="brand-sub">CAKRAWALA<br>SEMESTA<br>ESTETIKA</span>
      </td>
      <td class="kop-title">
        <div class="t1">SPESIFIKASI BAHAN BAKU</div>
        <div class="t2">${namaBB.toUpperCase()}/${kodeBB}</div>
      </td>
      <td class="kop-meta">
        <div class="pg">Halaman 1 dari 1</div>
        <table>
          <tr><td class="ml">No. Dokumen</td><td>: ${noDokTerbaru}</td></tr>
          <tr><td class="ml">Tanggal Berlaku</td><td>: ${tanggal}</td></tr>
          <tr><td class="ml">Menggantikan</td><td>: ${noDokSebelumnya}</td></tr>
          <tr><td class="ml">Tanggal</td><td>: ${revNum > 0 ? tanggal : '-'}</td></tr>
        </table>
      </td>
    </tr>
  </table>

  <div class="bagian-hdr">BAGIAN RESEARCH AND DEVELOPMENT</div>
  <table class="ttd-tbl">
    <tr>
      <td>
        <span class="role">Disusun oleh<br>MOA dan Stabilita</span>
        <span class="name">Fransiska Mutiara</span>
      </td>
      <td>
        <span class="role">Diperiksa oleh<br>PIC MOA dan Stabilita</span>
        <span class="name">Andreana Anggi</span>
      </td>
      <td style="border-right:1.5px solid #111">
        <span class="role">Disetujui oleh<br>Apoteker Penanggung Jawab</span>
        <span class="name">Vicania Raisa Rahman</span>
      </td>
    </tr>
  </table>

  <!-- 1. IDENTITAS -->
  <div class="sec">
    <div class="sec-title">1. IDENTITAS BAHAN BAKU</div>
    <table class="tbl">
      <tr><td class="lbl">Nama Bahan Baku/Kode Bahan</td><td>${namaBB}</td></tr>
      <tr><td class="lbl">INCI</td><td>${inci}</td></tr>
      <tr><td class="lbl">Produsen</td><td>${produsen}</td></tr>
      <tr><td class="lbl">Nama Pemasok/Supplier</td><td>${namaPemasok}</td></tr>

async function downloadPDF() {
  if (!currentDoc) return;
  const docEl = document.getElementById('docContent');
  if (!docEl) return;

  const overlay = document.getElementById('spinnerOverlay');
  const msg = document.getElementById('spinnerMsg');
  overlay.classList.add('show');
  msg.textContent = 'Merender dokumen…';

  try {
    const canvas = await html2canvas(docEl, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false
    });

    msg.textContent = 'Membuat PDF…';

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const pageW = 210;
    const pageH = 297;
    const margin = 8;
    const imgW = pageW - margin * 2;

    const canvasW = canvas.width;
    const canvasH = canvas.height;
    const ratio = canvasW / canvasH;
    const imgH = imgW / ratio;

    if (imgH <= pageH - margin * 2) {
      const imgData = canvas.toDataURL('image/jpeg', 0.97);
      pdf.addImage(imgData, 'JPEG', margin, margin, imgW, imgH);
    } else {
      const pxPerMm = canvasW / imgW;
      const sliceH = (pageH - margin * 2) * pxPerMm;
      let yOffset = 0;
      let page = 0;
      while (yOffset < canvasH) {
        const sliceCanvas = document.createElement('canvas');
        sliceCanvas.width = canvasW;
        sliceCanvas.height = Math.min(sliceH, canvasH - yOffset);
        const ctx = sliceCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, sliceCanvas.width, sliceCanvas.height);
        ctx.drawImage(canvas, 0, yOffset, canvasW, sliceCanvas.height, 0, 0, canvasW, sliceCanvas.height);
        const sliceData = sliceCanvas.toDataURL('image/jpeg', 0.97);
        const sliceImgH = (sliceCanvas.height / pxPerMm);
        if (page > 0) pdf.addPage();
        pdf.addImage(sliceData, 'JPEG', margin, margin, imgW, sliceImgH);
        yOffset += sliceH;
        page++;
      }
    }

    const kode = getField(currentDoc, ['kodeBB','kode_bb','Kode BB (Isi)']);
    const nama = getField(currentDoc, ['namaBB','nama_bb','Nama Bahan Baku']);
    const filename = `SBB_${kode}_${(nama||'').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`;
    pdf.save(filename);
  } catch(e) {
    alert('Gagal membuat PDF: ' + e.message);
  } finally {
    overlay.classList.remove('show');
  }
}
