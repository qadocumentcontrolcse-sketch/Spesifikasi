<html lang="id">
<head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display&display=swap');

  :root {
    --navy: #1a3a6b;
    --navy-light: #2a5298;
    --accent: #c8963e;
    --bg: #f2f0eb;
    --paper: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --border: #d0ccc4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  .app-header {
    max-width: 880px; margin: 0 auto 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .logo-box {
    width: 46px; height: 46px; background: var(--navy);
    border-radius: 8px; display: flex; align-items: center;
    justify-content: center; color: #fff;
    font-family: 'DM Serif Display', serif; font-size: 16px;
    flex-shrink: 0;
  }
  .app-title h1 { font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--navy); }
  .app-title p { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .config-banner {
    max-width: 880px; margin: 0 auto 14px;
    background: #fff8e6; border: 1px solid #e8c96a;
    border-radius: 8px; padding: 11px 16px;
    font-size: 12px; color: #7a5c00;
  }
  .config-banner details summary { cursor: pointer; font-weight: 600; }
  .config-banner input {
    width: 100%; margin-top: 7px;
    border: 1px solid #e8c96a; border-radius: 4px;
    padding: 6px 10px; font-size: 12px; background: #fff;
    font-family: 'Inter', sans-serif;
  }
  .config-banner .cfg-btn {
    margin-top: 6px; padding: 5px 14px;
    background: var(--navy); color: #fff;
    border: none; border-radius: 4px; font-size: 12px;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }

  .selector-bar {
    max-width: 880px; margin: 0 auto 20px;
    background: var(--paper); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .selector-bar label { font-size: 11px; font-weight: 600; letter-spacing: .07em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .selector-bar select {
    flex: 1; min-width: 220px;
    font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px; background: var(--bg); cursor: pointer; outline: none;
  }
  .selector-bar select:focus { border-color: var(--navy); }

  .btn-dl {
    padding: 8px 18px; background: var(--navy); color: #fff;
    border: none; border-radius: 6px; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 6px; transition: background .15s;
  }
  .btn-dl:hover { background: var(--navy-light); }
  .btn-dl:disabled { background: #999; cursor: not-allowed; }
  .btn-dl-word { background: #2b579a; }
  .btn-dl-word:hover { background: #3a6cb8; }
  .btn-dl-word:disabled { background: #999; }

  .doc-wrap { max-width: 880px; margin: 0 auto; }

  #docArea {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 2px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
  }

  /* ── DOCUMENT PRINT AREA ── */
  #docContent {
    width: 794px;
    padding: 40px 50px;
    font-family: 'Times New Roman', Times, serif;
    font-size: 11pt;
    color: #000000;
    background: #fff;
    margin: 0 auto;

  /* KOP — match DOCX exactly: 2 baris x 2 kolom (logo+judul | meta), lalu gabung */
  .kop {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid #000;
    margin-bottom: 0;
    table-layout: fixed;
  }
  .kop td {
    border: 1px solid #000;
    vertical-align: middle;
    font-family: 'Times New Roman', Times, serif;
    font-size: 11pt;
    color: #000;

  .kop-logo {
    width: 130px;
    text-align: left;

    padding: 4px 8px 6px;
  }
  .kop-logo .cse-logo-img {
    max-width: 120px;
    height: auto;
    display: inline-block;
  }
  .kop-title {
    width: 45%;
    text-align: center;
    padding: 4px 10px;
  }
  .kop-title .t1 {
    font-size: 14pt;
    font-weight: 700;
    line-height: 1.15;
  }
  .kop-title .t2 {
    font-size: 14pt;
    font-weight: 700;
  }
  .kop-meta-top {
    padding: 7px 10px;
    font-size: 11pt;
    vertical-align: middle;
  }
  .kop-meta-top .pg {
    font-weight: 700;
    text-align: center;
  }
  .kop-meta-bottom {
    padding: 7px 10px;
    font-size: 11pt;
    vertical-align: top;
  }
  .kop-meta-bottom table {
    border-collapse: collapse;
    font-size: 11pt;
    width: 100%;
  }
  .kop-meta-bottom table td {
    border: none;
    padding: 1px 0;
    vertical-align: top;
    font-size: 11pt;
  }
  .kop-meta-bottom .ml {
    font-weight: 700;
    white-space: nowrap;
    padding-right: 4px;
    min-width: 110px;
  }

  /* BAGIAN header */
  .bagian-hdr {
    border: 1px solid #000;
    border-top: none;
    text-align: center;
    font-size: 11pt;
    font-weight: 700;
    padding: 5px;
    font-family: 'Times New Roman', Times, serif;
    color: #000;
  }

  /* TTD grid */
  .ttd-tbl {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid #000;
    border-top: none;
    margin-bottom: 20px;
    font-family: 'Times New Roman', Times, serif;
  }
  .ttd-tbl td {
    border-left: 1px solid #000;
    font-size: 11pt;
    text-align: center;
    width: 33.33%;
    color: #000;
  }
  .ttd-tbl td:first-child { border-left: none; }
  .ttd-tbl .role-cell {
    font-weight: 700;

    border-bottom: 1px solid #000;
  }
  .ttd-tbl .sign-cell {
    height: 110px;
    border-bottom: 1px solid #000;
  }
  .ttd-tbl .name-cell {
    font-weight: 700;
    padding: 4px 12px 7px;

  /* Sections */
  .sec { margin-bottom: 16px; }
  .sec-title {
    font-size: 11pt;
    font-weight: 700;
    text-decoration: none;
    margin-bottom: 5px;
    font-family: 'Times New Roman', Times, serif;
    color: #000;

  /* Identitas table */
  table.tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 11pt;
    font-family: 'Times New Roman', Times, serif;

  table.tbl th {
    background: transparent;
    color: #000;
    padding: 5px 8px;
    text-align: center;
    font-size: 11pt;
    font-weight: 700;

  table.tbl td {
    border: 1px solid #000;

    vertical-align: top;
    color: #000;

  table.tbl .lbl {

  table.tbl .multiline {

    width: 100%;

    background: transparent;
    color: #000;
    padding: 5px 8px;

    font-weight: 700;
    text-align: center;

  .spinner {

<script>
const STORAGE_KEY = 'cse_sbb_api_url';
let API_URL = localStorage.getItem(STORAGE_KEY) || 'https://script.google.com/macros/s/AKfycbytg91zwj9QXlcPh_EQU9ykJ5CHe-OaLIFqloEeC2CGBQoMv48xJ7lFsvtCcgohra4h/exec';
let allData = [];
let currentDoc = null;

function saveApiUrl() {
  const v = document.getElementById('apiUrlInput').value.trim();
  if (!v) return alert('URL tidak boleh kosong.');
  localStorage.setItem(STORAGE_KEY, v);
  API_URL = v;
  loadData();
}

window.onload = () => {
  if (API_URL) {
    document.getElementById('apiUrlInput').value = API_URL;
    loadData();
  }
};

async function loadData() {
  const sel = document.getElementById('bbSelect');
  sel.innerHTML = '<option value="">— Memuat… —</option>';
  document.getElementById('dlBtn').disabled = true;
  try {
    const payload = encodeURIComponent(JSON.stringify({ action: 'getDaftarSBB' }));
    const res = await fetch(API_URL + '?payload=' + payload);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    allData = json;

    // Debug: log first item to see field names
    if (allData.length > 0) console.log('Field names sample:', Object.keys(allData[0]));

    // Revisi terbaru per kode BB
    const latest = {};
    allData.forEach(row => {
      const kode = getField(row, ['kodeBB','kode_bb','Kode BB (Isi)','kodeBb','kode BB']);
      const revisi = Number(getField(row, ['revisi','Revisi']) || 0);
      if (!latest[kode] || revisi > Number(getField(latest[kode], ['revisi','Revisi']) || 0))
        latest[kode] = row;
    });
    const sorted = Object.values(latest).sort((a,b) => {
      const na = getField(a,['namaBB','nama_bb','Nama Bahan Baku','namaBahanbaku']) || '';
      const nb = getField(b,['namaBB','nama_bb','Nama Bahan Baku','namaBahanbaku']) || '';
      return na.localeCompare(nb);
    });

    sel.innerHTML = '<option value="">— Pilih Bahan Baku —</option>';
    sorted.forEach(r => {
      const kode = getField(r,['kodeBB','kode_bb','Kode BB (Isi)']);
      const nama = getField(r,['namaBB','nama_bb','Nama Bahan Baku']);
      const noDok = getField(r,['noDokTerbaru','no_dok_terbaru','Nomor Dokumen Terbaru (Acuan)','noDokumen']);
      const o = document.createElement('option');
      o.value = noDok;
      o.textContent = `${kode} — ${nama}`;
      sel.appendChild(o);
    });
  } catch(e) {
    sel.innerHTML = '<option value="">— Gagal memuat —</option>';
    alert('Gagal memuat data: ' + e.message);
  }
}

/**
 * Cari field dari beberapa kemungkinan nama
 */
function getField(obj, keys) {
  for (const k of keys) {
    if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
  }
  // fallback: case-insensitive search
  const lkeys = keys.map(k => k.toLowerCase().replace(/[\s_\-()]/g,''));
  for (const [key, val] of Object.entries(obj)) {
    if (val === undefined || val === null || val === '') continue;
    const norm = key.toLowerCase().replace(/[\s_\-()]/g,'');
    if (lkeys.some(lk => norm === lk || norm.includes(lk) || lk.includes(norm))) return val;
  }
  return '';
}

function safe(v) {
  if (v === undefined || v === null || v === '' || v === '-') return '-';
  return String(v).trim() || '-';
}

/**
 * Format tanggal dari berbagai format:
 * - Serial Excel (angka seperti 46065)
 * - ISO string (2026-06-07T17:00:00.000Z)
 * - String tanggal biasa
 */
function formatDate(val) {
  if (!val || val === '-' || val === '') return '-';

  const s = String(val).trim();

  // ISO string: 2026-06-07T17:00:00.000Z atau 2026-06-07
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    // Ambil hanya bagian tanggal, hindari timezone issue
    const parts = s.substring(0, 10).split('-');
    const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  // Serial Excel (angka)
  const num = parseFloat(s);
  if (!isNaN(num) && num > 40000 && num < 60000) {
    // Excel serial date: hari sejak 1 Jan 1900 (dengan bug tahun kabisat 1900)
    const d = new Date(Math.round((num - 25569) * 86400 * 1000));
    // Koreksi timezone
    const utc = new Date(d.getTime() + d.getTimezoneOffset() * 60000);
    return utc.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  // Sudah string tanggal biasa
  return s;

function renderDoc() {
  const noDok = document.getElementById('bbSelect').value;
  const dlBtn = document.getElementById('dlBtn');
  const dlBtnWord = document.getElementById('dlBtnWord');
  if (!noDok) {
    document.getElementById('docArea').innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p>Pilih bahan baku dari dropdown untuk menampilkan dokumen spesifikasi.</p>
      </div>`;
    dlBtn.disabled = true;
    dlBtnWord.disabled = true;
    currentDoc = null;
    return;
  }

  // Cari semua baris dengan noDok ini (berbagai kemungkinan nama field)
  const docRows = allData.filter(r => {
    const nd = getField(r, ['noDokTerbaru','no_dok_terbaru','Nomor Dokumen Terbaru (Acuan)','noDokumen']);
    return nd === noDok;
  });
  if (!docRows.length) return;
  const d = docRows.sort((a,b) => Number(getField(b,['revisi','Revisi'])||0) - Number(getField(a,['revisi','Revisi'])||0))[0];
  currentDoc = d;

  // Debug: tampilkan semua field
  console.log('Selected row fields:', d);

  // Helper untuk ambil field dari row ini
  const f = (keys) => safe(getField(d, keys));

  // Field names — support berbagai variasi nama dari Apps Script
  const kodeBB    = f(['kodeBB','kode_bb','Kode BB (Isi)','kodeBb']);
  const namaBB    = f(['namaBB','nama_bb','Nama Bahan Baku','namaBahanbaku']);
  const noDokTerbaru = f(['noDokTerbaru','no_dok_terbaru','Nomor Dokumen Terbaru (Acuan)','noDokumen','nomorDokumenTerbaru']);
  const noDokSebelumnya = f(['noDokSebelumnya','no_dok_sebelumnya','No. Dokumen Sebelumnya','nomorDokumenSebelumnya']);
  const tanggal   = formatDate(getField(d, ['tanggal','Tanggal (Isi)','tanggalIsi','tanggalBerlaku']));
  const revisi    = getField(d, ['revisi','Revisi']) || '0';

  const inci      = f(['inci','INCI']);
  const produsen  = f(['produsen','PRODUSEN','produsen']);

async function downloadPDF() {
  if (!currentDoc) return;

  const overlay = document.getElementById('spinnerOverlay');
  const msg = document.getElementById('spinnerMsg');
  overlay.classList.add('show');
  msg.textContent = 'Menyiapkan halaman…';

  // Container tersembunyi untuk membangun & mengukur halaman A4 satu per satu
  const stage = document.createElement('div');
  stage.style.position = 'fixed';
  stage.style.left = '-99999px';
  stage.style.top = '0';
  stage.style.zIndex = '-1';
  document.body.appendChild(stage);

  try {
    const d = currentDoc;
    const f = (keys) => safe(getField(d, keys));
    const kodeBB    = f(['kodeBB','kode_bb','Kode BB (Isi)','kodeBb']);
    const namaBB    = f(['namaBB','nama_bb','Nama Bahan Baku','namaBahanbaku']);
    const noDokTerbaru = f(['noDokTerbaru','no_dok_terbaru','Nomor Dokumen Terbaru (Acuan)','noDokumen','nomorDokumenTerbaru']);
    const noDokSebelumnya = f(['noDokSebelumnya','no_dok_sebelumnya','No. Dokumen Sebelumnya','nomorDokumenSebelumnya']);
    const tanggal   = formatDate(getField(d, ['tanggal','Tanggal (Isi)','tanggalIsi','tanggalBerlaku']));

    // Ambil HTML body sections yang sudah dirender di layar (docContent saat ini)
    const liveDoc = document.getElementById('docContent');
    if (!liveDoc) throw new Error('Dokumen belum dirender');

    // Body blocks = setiap .sec (section 1, 2, 3) dianggap 1 blok yang tidak boleh terpotong.
    // Untuk section riwayat (3) yang berpotensi panjang, baris-baris <tr> bisa dipecah antar halaman.
    const sections = Array.from(liveDoc.querySelectorAll(':scope > .sec'));
    if (!sections.length) throw new Error('Konten dokumen kosong');

    // Pisahkan: section riwayat (terakhir) dipecah per baris jika perlu; section lain jadi 1 blok utuh.
    const riwayatSection = sections[sections.length - 1];
    const otherSections = sections.slice(0, -1);

    const riwayatTitle = riwayatSection.querySelector('.sec-title')?.outerHTML || '';
    const riwayatTable = riwayatSection.querySelector('table.rtbl');
    const riwayatTheadHTML = riwayatTable ? riwayatTable.querySelector('thead').outerHTML : '';
    const riwayatRows = riwayatTable ? Array.from(riwayatTable.querySelectorAll('tbody > tr')) : [];

    // ── Bangun halaman-halaman ──
    // Page wrapper: ukuran A4 794x1123px @ 96dpi approx (kita pakai lebar 794 spt docContent asli, tinggi A4 ratio)
    const PAGE_W = 794;
    const PAGE_PAD = 40; // padding kiri-kanan-atas-bawah seperti #docContent asli
    const MAX_BODY_H = 925; // batas tinggi area body per halaman (px), disesuaikan agar muat A4 dgn margin cetak (dikurangi krn sign-cell lebih tinggi)

    function makePageShell() {
      const page = document.createElement('div');
      page.className = 'pdf-page';
      page.style.width = PAGE_W + 'px';
      page.style.padding = PAGE_PAD + 'px 50px';
      page.style.fontFamily = "'Times New Roman', Times, serif";
      page.style.fontSize = '11pt';
      page.style.color = '#000';
      page.style.background = '#fff';
      page.style.boxSizing = 'border-box';
      const kopWrap = document.createElement('div');
      kopWrap.innerHTML = buildKopHTML(d, kodeBB, namaBB, noDokTerbaru, tanggal, noDokSebelumnya, 1, 1);
      const ttdWrap = document.createElement('div');
      ttdWrap.innerHTML = buildTtdHTML();
      const bodyWrap = document.createElement('div');
      bodyWrap.className = 'pdf-page-body';
      bodyWrap.style.marginTop = '0';
      page.appendChild(kopWrap.firstElementChild);
      page.appendChild(ttdWrap.firstElementChild);
      page.appendChild(ttdWrap.lastElementChild);
      page.appendChild(bodyWrap);
      return { page, bodyWrap };
    }

    const pages = [];
    let current = makePageShell();
    stage.appendChild(current.page);

    function currentBodyHeight() {
      return current.bodyWrap.scrollHeight;
    }

    function newPage() {
      pages.push(current.page);
      current = makePageShell();
      stage.appendChild(current.page);
    }

    // Tambahkan section non-riwayat sebagai blok utuh
    otherSections.forEach(sec => {
      const clone = sec.cloneNode(true);
      current.bodyWrap.appendChild(clone);
      if (currentBodyHeight() > MAX_BODY_H) {
        current.bodyWrap.removeChild(clone);
        newPage();
        current.bodyWrap.appendChild(clone);
      }
    });

    // Tambahkan section riwayat: judul + tabel, baris ditambah satu-satu agar tidak terpotong di tengah baris
    if (riwayatTable) {
      const secDiv = document.createElement('div');
      secDiv.className = 'sec';
      secDiv.innerHTML = riwayatTitle + `<table class="rtbl">${riwayatTheadHTML}<tbody></tbody></table>`;
      current.bodyWrap.appendChild(secDiv);
      if (currentBodyHeight() > MAX_BODY_H) {
        current.bodyWrap.removeChild(secDiv);
        newPage();
        current.bodyWrap.appendChild(secDiv);
      }
      let tbody = secDiv.querySelector('tbody');

      riwayatRows.forEach(rowEl => {
        const rowClone = rowEl.cloneNode(true);
        tbody.appendChild(rowClone);
        if (currentBodyHeight() > MAX_BODY_H) {
          tbody.removeChild(rowClone);
          newPage();
          const secDiv2 = document.createElement('div');
          secDiv2.className = 'sec';
          secDiv2.innerHTML = `<table class="rtbl">${riwayatTheadHTML}<tbody></tbody></table>`;
          current.bodyWrap.appendChild(secDiv2);
          tbody = secDiv2.querySelector('tbody');
          tbody.appendChild(rowClone);
        }
      });
    }

    pages.push(current.page);

    // Update nomor halaman pada tiap kop yang sudah dibangun
    const totalPages = pages.length;
    pages.forEach((pageEl, idx) => {
      const pgEl = pageEl.querySelector('.kop-meta-top .pg');
      if (pgEl) pgEl.textContent = `Halaman ${idx + 1} dari ${totalPages}`;
    });

    // ── Screenshot tiap halaman & susun ke PDF ──
    msg.textContent = 'Merender halaman 1 dari ' + totalPages + '…';
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageWmm = 210;
    const pageHmm = 297;
    const marginMm = 8;
    const imgWmm = pageWmm - marginMm * 2;

    for (let i = 0; i < pages.length; i++) {
      msg.textContent = `Merender halaman ${i + 1} dari ${totalPages}…`;
      const canvas = await html2canvas(pages[i], {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false
      });
      const imgData = canvas.toDataURL('image/jpeg', 0.97);
      const ratio = canvas.width / canvas.height;
      let imgHmm = imgWmm / ratio;
      if (imgHmm > pageHmm - marginMm * 2) imgHmm = pageHmm - marginMm * 2;
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', marginMm, marginMm, imgWmm, imgHmm);
    }

    msg.textContent = 'Menyimpan PDF…';
    const kode = getField(currentDoc, ['kodeBB','kode_bb','Kode BB (Isi)']);
    const nama = getField(currentDoc, ['namaBB','nama_bb','Nama Bahan Baku']);
    const filename = `SBB_${kode}_${(nama||'').replace(/[^a-zA-Z0-9]/g,'_')}.pdf`;
    pdf.save(filename);
  } catch(e) {
    alert('Gagal membuat PDF: ' + e.message);
    console.error(e);
  } finally {
    document.body.removeChild(stage);
    overlay.classList.remove('show');
  }
}

          margins: { top: 0, bottom: 0, left: 100, right: 100 },
          children: [
            new Paragraph({ spacing: { before: 0, after: 0 }, children: [new TextRun({ text: ' ', size: SZ11, font: FONT })] }),
            new Paragraph({ spacing: { before: 0, after: 0 }, children: [new TextRun({ text: ' ', size: SZ11, font: FONT })] }),
            new Paragraph({ spacing: { before: 0, after: 0 }, children: [new TextRun({ text: ' ', size: SZ11, font: FONT })] }),
            new Paragraph({ spacing: { before: 0, after: 0 }, children: [new TextRun({ text: ' ', size: SZ11, font: FONT })] }),
            new Paragraph({ spacing: { before: 0, after: 0 }, children: [new TextRun({ text: ' ', size: SZ11, font: FONT })] }),
            new Paragraph({ spacing: { before: 0, after: 0 }, children: [new TextRun({ text: ' ', size: SZ11, font: FONT })] }),
          ],
        });
      }

      function nameCell(name, isLast) {
        return new TableCell({
          borders: cellBorders({ top: true, right: isLast ? true : false }),
          width: { size: colW, type: WidthType.DXA },
          margins: { top: 60, bottom: 60, left: 100, right: 100 },
          children: [
            new Paragraph({
              alignment: AlignmentType.CENTER,
              spacing: { before: 0, after: 0 },
              children: [new TextRun({ text: name, bold: true, size: SZ11, font: FONT, color: black })],
            }),
          ],
        });
      }

      const ttdTable = new Table({
        width: { size: 9906, type: WidthType.DXA },
        columnWidths: [colW, colW, colW],
        rows: [
          new TableRow({ children: [
            roleCell(roles[0], false),
            roleCell(roles[1], false),
            roleCell(roles[2], true),
          ] }),
          new TableRow({ children: [
            signCell(false),
            signCell(false),
            signCell(true),
          ] }),
          new TableRow({ children: [
            nameCell(names[0], false),
            nameCell(names[1], false),
            nameCell(names[2], true),
          ] }),
        ],
      });

      return [kopTable, bagianHdr, ttdTable, new Paragraph({ spacing: { after: 120 }, children: [] })];
    }

    function sectionTitle(text) {
      return new Paragraph({
        spacing: { before: 120, after: 80 },
        children: [new TextRun({ text, bold: true, size: SZ11, font: FONT, color: black })],
      });
    }

    function tblCell(text, opts = {}) {
      return new TableCell({
        borders: cellBorders(),
        width: { size: opts.width || 3000, type: WidthType.DXA },
        verticalAlign: VerticalAlign.TOP,
        margins: { top: 60, bottom: 60, left: 100, right: 100 },
        children: (Array.isArray(text) ? text : [text]).map(t =>
          typeof t === 'string'
            ? new Paragraph({ alignment: opts.align || AlignmentType.LEFT, spacing: { after: 0 }, children: [new TextRun({ text: t, bold: !!opts.bold, size: SZ11, font: FONT, color: black })] })
            : t
        ),
      });
    }

    function buildIdentitas() {
      const rows = [
        ['Nama Bahan Baku/Kode Bahan', namaBB],
        ['INCI', inci],
        ['Produsen', produsen],
        ['Nama Pemasok/Supplier', namaPemasok],
        ['Negara Produsen', negaraProdusen],
      ];
      return new Table({
        width: { size: 9906, type: WidthType.DXA },
        columnWidths: [3300, 6606],
        rows: rows.map(([label, val]) => new TableRow({ children: [tblCell(label, { width: 3300 }), tblCell(val, { width: 6606 })] })),
      });
    }

    function multilineCell(lines, opts = {}) {
      return new TableCell({
        borders: cellBorders(),
        width: { size: opts.width || 3000, type: WidthType.DXA },
        verticalAlign: VerticalAlign.TOP,
        margins: { top: 60, bottom: 60, left: 100, right: 100 },
        children: lines.map(l => new Paragraph({ spacing: { after: 40 }, children: [new TextRun({ text: l.text, bold: !!l.bold, size: SZ11, font: FONT, color: black })] })),
      });
    }

    function buildParameterUji() {
      const headerRow = new TableRow({
        tableHeader: true,
        children: [
          tblCell([new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: 'ANALISA', bold: true, size: SZ11, font: FONT, color: black })] })], { width: 2967 }),
          tblCell([new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: 'SPESIFIKASI', bold: true, size: SZ11, font: FONT, color: black })] })], { width: 3761 }),
          tblCell([new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: 'METODE', bold: true, size: SZ11, font: FONT, color: black })] })], { width: 3178 }),
        ],
      });
      const row1 = new TableRow({ children: [
        multilineCell([{ text: 'Pemerian', bold: true }, { text: 'a. Bentuk' }, { text: 'b. Warna' }, { text: 'c. Bau' }], { width: 2967 }),
        multilineCell([{ text: ' ' }, { text: bentuk }, { text: warna }, { text: bau }], { width: 3761 }),
        multilineCell([{ text: ' ' }, { text: 'Visual & Organoleptik' }], { width: 3178 }),
      ] });
      const row2 = new TableRow({ children: [
        multilineCell([{ text: 'Tetapan Fisik', bold: true }, { text: 'pH' }, { text: 'Viskositas' }, { text: 'Berat Jenis' }, { text: 'Index Refraksi' }, { text: 'Kelarutan' }], { width: 2967 }),
        multilineCell([{ text: ' ' }, { text: ph }, { text: viskositas }, { text: beratJenis }, { text: indeksBias }, { text: kelarutan }], { width: 3761 }),
        multilineCell([{ text: ' ' }, { text: 'pH Meter' }, { text: 'Viskometer' }, { text: 'Piknometer' }, { text: 'Refraktometer' }, { text: 'Uji Kualitatif' }], { width: 3178 }),
      ] });
      const row3 = new TableRow({ children: [
        tblCell('Kondisi penyimpanan', { width: 2800, bold: true }),
        tblCell(kondisiPenyimpanan, { width: 3761 }),
        tblCell('Visual', { width: 3178 }),
      ] });
      return new Table({ width: { size: 9906, type: WidthType.DXA }, columnWidths: [2967, 3761, 3178], rows: [headerRow, row1, row2, row3] });
    }

    function buildRiwayat() {
      const headerRow = new TableRow({
        tableHeader: true,
        children: [
          tblCell([new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: 'No. Revisi', bold: true, size: SZ11, font: FONT, color: black })] })], { width: 1165 }),
          tblCell([new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: 'Nomor Dokumen', bold: true, size: SZ11, font: FONT, color: black })] })], { width: 2755 }),
          tblCell([new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: 'Tanggal Berlaku', bold: true, size: SZ11, font: FONT, color: black })] })], { width: 2119 }),
          tblCell([new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: 'Alasan Perubahan', bold: true, size: SZ11, font: FONT, color: black })] })], { width: 3867 }),
        ],
      });
      const dataRows = riwayat.map(r => new TableRow({
        cantSplit: true,
        children: [
        tblCell([new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: r.revisi, size: SZ11, font: FONT, color: black })] })], { width: 1165 }),
        tblCell([new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: r.noDok, size: SZ11, font: FONT, color: black })] })], { width: 2755 }),
        tblCell([new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: r.tanggal, size: SZ11, font: FONT, color: black })] })], { width: 2119 }),
        tblCell(r.alasan, { width: 3867 }),
      ] }));
      return new Table({ width: { size: 9906, type: WidthType.DXA }, columnWidths: [1165, 2755, 2119, 3867], rows: [headerRow, ...dataRows] });
    }

    msg.textContent = 'Menyusun struktur dokumen…';
    const doc = new Document({
      sections: [{
        properties: {
          page: {
            size: { width: 11906, height: 16838 },
            margin: { top: 720, right: 1000, bottom: 720, left: 1000 },
          },
        },
        headers: { default: new Header({ children: buildKop() }) },
        children: [
          sectionTitle('1. IDENTITAS BAHAN BAKU'),
          buildIdentitas(),
          sectionTitle('2. PARAMETER UJI'),
          buildParameterUji(),
          sectionTitle('3. RIWAYAT PERUBAHAN'),
          buildRiwayat(),
        ],
      }],
    });

    msg.textContent = 'Menyimpan file Word…';
    const blob = await Packer.toBlob(doc);
    const kodeFile = getField(currentDoc, ['kodeBB','kode_bb','Kode BB (Isi)']);
    const namaFile = getField(currentDoc, ['namaBB','nama_bb','Nama Bahan Baku']);
    const filename = `SBB_${kodeFile}_${(namaFile||'').replace(/[^a-zA-Z0-9]/g,'_')}.docx`;

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Gagal membuat Word: ' + e.message);
    console.error(e);
  } finally {
    overlay.classList.remove('show');
  }
}
</script>
</body>
</html>
